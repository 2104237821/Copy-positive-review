    /* 基础样式重置 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;

    header {

    }
    
    h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #1F2937;
      margin-bottom: 0.5rem;
    }
    
    header p {
      color: #6B7280;
    }
    
    /* 好评卡片样式 */
    .review-card {
      background: white;
      border-radius: 0.75rem;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      padding: 1.5rem;
      margin-bottom: 1rem;
      transition: all 0.3s ease;
    }
    
    .review-card:hover {
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      transform: translateY(-2px);
    }
    
    .review-content {
      color: #4B5563;
      margin-bottom: 1rem;
      font-size: 1rem;
    }
    
    /* 按钮样式 */
    .copy-btn {
      background-color: #E0E7FF;
      color: #4F46E5;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .copy-btn:hover {
      background-color: #4F46E5;
      color: white;
    }
    
    .copy-btn.copied {
      background-color: #FEE2E2;
      color: #DC2626;
      cursor: not-allowed;
    }
    
    .review-card.copied {
      border: 2px solid #DC2626;
      background-color: #FEF2F2;
    }
    
    /* 复制成功提示 */
    .copy-success {
      color: #10B981;
      font-size: 0.75rem;
      margin-top: 0.5rem;
      display: none;
    }
    
    .copy-success.show {
      display: block;
    }
    
    /* 动画效果 */
    .fade-out {
      animation: fadeOut 0.5s ease-out forwards;
    }
    
    @keyframes fadeOut {
      from {
        opacity: 1;
        transform: translateY(0);
      }
      to {
        opacity: 0;
        transform: translateY(-10px);
      }
    }
    
    h2 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #1F2937;
      margin-bottom: 0.5rem;
    }
    
    /* 刷新按钮 */
    .refresh-btn {
      background-color: #4F46E5;
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s ease;
      display: block;
      margin: 0 auto;
    }

    }

    .pagination {

      flex-direction: column;
      align-items: center;
      margin: 2rem 0;
      gap: 0.5rem;
    }

    }

      color: white;

    // 分页相关变量
    let currentPage = getCurrentPage();
    const pageSize = 10;

    // 从localStorage获取已复制的好评ID
    function getCopiedReviews() {
      try {
        const copied = localStorage.getItem('copiedReviews');
        return copied ? JSON.parse(copied) : [];
      } catch (error) {
        console.error('读取localStorage失败:', error);
        return [];
      }
    }

    // 保存已复制的好评ID到localStorage
    function saveCopiedReview(reviewId) {
      try {
        const copiedReviews = getCopiedReviews();
        if (!copiedReviews.includes(reviewId)) {
          copiedReviews.push(reviewId);
          localStorage.setItem('copiedReviews', JSON.stringify(copiedReviews));
        }
      } catch (error) {
        console.error('写入localStorage失败:', error);
      }
    }

    // 保存当前页码到localStorage
    function saveCurrentPage() {
      try {
        localStorage.setItem('currentPage', currentPage);
      } catch (error) {
        console.error('保存页码失败:', error);
      }
    }

    // 从localStorage获取当前页码
    function getCurrentPage() {
      try {
        const page = localStorage.getItem('currentPage');
        return page ? parseInt(page) : 1;
      } catch (error) {
        console.error('读取页码失败:', error);
        return 1;
      }
    }

    // 渲染好评列表
    function renderReviews() {
      const container = document.getElementById('reviews-container');
      const copiedReviews = getCopiedReviews();
      
      // 过滤出未复制的好评
      const remainingReviews = reviews.filter(review => !copiedReviews.includes(review.id));
      
      // 保持固定排序，不随机
      // remainingReviews.sort(() => Math.random() - 0.5);
      
      // 计算分页
      const totalPages = Math.ceil(remainingReviews.length / pageSize);
      const startIndex = (currentPage - 1) * pageSize;
      const endIndex = startIndex + pageSize;
      const displayReviews = remainingReviews.slice(startIndex, endIndex);
      
      // 清空容器
      container.innerHTML = '';
      
      // 显示好评列表
      displayReviews.forEach(review => {
        const reviewElement = document.createElement('div');
        reviewElement.className = 'review-card';
        reviewElement.dataset.reviewId = review.id;
        
        reviewElement.innerHTML = `
          <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem;">
            <p class="review-content">"${review.content}"</p>
            <button class="copy-btn">
              复制
            </button>
          </div>
          <div class="copy-success">
            复制成功！
          </div>
        `;
        
        container.appendChild(reviewElement);
      });
      
      // 渲染分页按钮
      renderPagination(totalPages);
      
      // 添加复制按钮事件监听
      addCopyEventListeners();
    }

    // 渲染分页按钮
    function renderPagination(totalPages) {
      const paginationContainer = document.getElementById('pagination');
      paginationContainer.innerHTML = '';
      
      // 计算需要的行数
      const pagesPerRow = 10;
      const rows = Math.ceil(totalPages / pagesPerRow);
      
      // 生成每行的页码按钮
      for (let row = 0; row < rows; row++) {
        const rowContainer = document.createElement('div');
        rowContainer.style.display = 'flex';
        rowContainer.style.justifyContent = 'center';
        rowContainer.style.marginBottom = '0.5rem';
        rowContainer.style.gap = '0.5rem';
        
        const startPage = row * pagesPerRow + 1;
        const endPage = Math.min(startPage + pagesPerRow - 1, totalPages);
        
        for (let i = startPage; i <= endPage; i++) {
          const pageButton = document.createElement('button');
          pageButton.className = `page-btn ${i === currentPage ? 'active' : ''}`;
          pageButton.textContent = i;
          pageButton.addEventListener('click', () => {
            currentPage = i;
            saveCurrentPage();
            renderReviews();
          });
          rowContainer.appendChild(pageButton);
        }
        
        paginationContainer.appendChild(rowContainer);
      }
    }

    // 添加复制按钮事件监听
    function addCopyEventListeners() {
      const copyButtons = document.querySelectorAll('.copy-btn');
      
      copyButtons.forEach(button => {
        button.addEventListener('click', function() {
          const reviewElement = this.closest('[data-review-id]');
          const reviewId = parseInt(reviewElement.dataset.reviewId);
          const reviewContent = reviewElement.querySelector('.review-content').textContent.replace(/"/g, '');
          const successMessage = reviewElement.querySelector('.copy-success');
          
          // 复制到剪贴板
          navigator.clipboard.writeText(reviewContent)
            .then(() => {
              // 显示复制成功提示
              successMessage.classList.add('show');
              
              // 更改按钮状态
              this.textContent = '已复制';
              this.classList.add('copied');
              
              // 将div变成红色
              reviewElement.classList.add('copied');
              
              // 保存到localStorage
              saveCopiedReview(reviewId);
              
              // 3秒后隐藏好评
              setTimeout(() => {
                reviewElement.classList.add('fade-out');
                setTimeout(() => {
                  // 重新渲染时保持当前页码
                  renderReviews();
                }, 500);
              }, 3000);
            })
            .catch(err => {
              console.error('复制失败:', err);
            });
        });
      });
    }

    // 刷新好评功能
    function setupRefreshButton() {
      const refreshButtons = document.querySelectorAll('#refresh-reviews-btn');
      
      refreshButtons.forEach(button => {
        button.addEventListener('click', function() {
          // 清除localStorage中的已复制记录
          try {
            localStorage.removeItem('copiedReviews');
            // 重置页码为1
            currentPage = 1;
            saveCurrentPage();
          } catch (error) {
            console.error('清除localStorage失败:', error);
          }
          // 重新渲染好评
          renderReviews();
        });
      });
    }

    // 初始化页面
    function init() {
      renderReviews();
      setupRefreshButton();
    }

    // 页面加载完成后初始化
    document.addEventListener('DOMContentLoaded', init);
  </script>
